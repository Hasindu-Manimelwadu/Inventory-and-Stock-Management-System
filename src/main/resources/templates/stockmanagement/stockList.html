<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stock Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .badge-STOCK_IN  { background-color: #198754; color: #fff; }
        .badge-STOCK_OUT { background-color: #dc3545; color: #fff; }
        .type-badge      { padding: 4px 10px; border-radius: 20px;
                           font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>
<div class="container-fluid mt-4 px-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>📦 Stock Transactions</h4>
        <a href="/stock/add" class="btn btn-primary">+ Add Stock Entry</a>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Filter Bar -->
    <div class="card mb-4 p-3">
        <form method="get" action="/stock/list">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text"
                           class="form-control"
                           name="search"
                           th:value="${search}"
                           placeholder="🔍 Search by Product ID or Name...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="type">
                        <option value="">All Types</option>
                        <option value="STOCK_IN"
                                th:selected="${type == 'STOCK_IN'}">
                            Stock In
                        </option>
                        <option value="STOCK_OUT"
                                th:selected="${type == 'STOCK_OUT'}">
                            Stock Out
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        Filter
                    </button>
                </div>
                <div class="col-md-2">
                    <a href="/stock/list" class="btn btn-outline-secondary w-100">
                        Clear
                    </a>
                </div>
            </div>
        </form>
    </div>

    <!-- Transactions Table -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Transaction ID</th>
                    <th>Type</th>
                    <th>Product ID</th>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Date</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>

                <!-- No records message -->
                <tr th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="8" class="text-center text-muted py-4">
                        No stock transactions found.
                    </td>
                </tr>

                <!-- Dynamic rows from controller -->
                <tr th:each="t : ${transactions}">
                    <td>
                        <strong th:text="${t.transactionId}"></strong>
                    </td>
                    <td>
                        <span th:classappend="'badge-' + ${t.transactionType}"
                              class="type-badge"
                              th:text="${t.transactionType}">
                        </span>
                    </td>
                    <td th:text="${t.productId}"></td>
                    <td th:text="${t.productName}"></td>
                    <td th:text="${t.quantity}"></td>
                    <td th:text="${t.date}"></td>
                    <td th:text="${t.notes}"></td>
                    <td>
                        <a th:href="@{/stock/update(id=${t.transactionId})}"
                           class="btn btn-sm btn-outline-primary">
                            Update
                        </a>
                        <a th:href="@{/stock/delete(id=${t.transactionId})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Delete this transaction?')">
                            Delete
                        </a>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
